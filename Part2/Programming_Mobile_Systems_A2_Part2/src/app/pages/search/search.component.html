<!--Main title of the page-->
<h2 class="page-title">Search & Filter Inventory</h2>

<!-- Product name search row -->
<div class="search-row name-row">
  <input 
    [(ngModel)]="filters.name" 
    placeholder="Enter item name"
    class="large-input"
  >  <!--Bidirectional binding of name filtering conditions-->
</div>

<!-- Other filtering criteria rows - include category, inventory, popularity, price range -->
<div class="search-row filter-row">
  <!--Category drop-down selection box-->
  <select [(ngModel)]="filters.category" class="large-select">
    <option value="">All Categories</option>
    <option *ngFor="let c of categories" [value]="c">{{c}}</option>
  </select>

  <!--Inventory status dropdown selection box-->
  <select [(ngModel)]="filters.stockStatus" class="large-select">
    <option value="">All Stock</option>
    <option *ngFor="let s of stockList" [value]="s">{{s}}</option>
  </select>

  <!--Popularity dropdown selection box-->
  <select [(ngModel)]="filters.popular" class="large-select">
    <option value="">All Popular</option>
    <option *ngFor="let p of popularList" [value]="p">{{p}}</option>
  </select>

  <!--Minimum Price Input Box-->
  <input 
    [(ngModel)]="filters.minPrice" 
    type="number" 
    placeholder="Min Price"
    class="large-input"
  >
  <!--Maximum price input box-->
  <input 
    [(ngModel)]="filters.maxPrice" 
    type="number" 
    placeholder="Max Price"
    class="large-input"
  >

  <!--The "Search/Reset" button, when clicked, triggers the corresponding logic.-->
  <button (click)="doSearch()" class="search-btn">Search</button>
  <button (click)="reset()" class="reset-btn">Reset</button>
</div>

<!-- No result prompt disappears after 5 seconds -->
<div *ngIf="noResult" class="no-result">
  No matching items found.
</div>

<!-- Result table -->
<div class="table-container" *ngIf="results.length > 0">
  <h3>Results ({{results.length}})</h3>
  <table class="result-table">
    <thead>
      <tr>
        <!--Table header - Corresponding product information fields-->
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Popular</th>
        <th>Comment</th>
      </tr>
    </thead>
    <tbody>
      <!--Cyclically render the search result list - rows are clickable, and clicking will redirect to the corresponding product.-->
      <tr 
        *ngFor="let item of results" 
        (click)="goToItem(item)"
        class="clickable-row"
      >
      <!--Render the values of each field of the product-->
        <td>{{item.id}}</td>
        <td>{{item.name}}</td>
        <td>{{item.category}}</td>
        <td>{{item.quantity}}</td>
        <td>${{item.price.toFixed(2)}}</td>  <!--Price is rounded to two decimal places and includes a dollar sign.-->
        <td>{{item.stockStatus}}</td>
        <td>{{item.popular}}</td>
        <td>{{item.comment}}</td>
      </tr>
    </tbody>
  </table>
</div>
<div *ngIf="toastVisible" class="toast-center {{toastType}}">
  {{ toastMessage }}
</div>
